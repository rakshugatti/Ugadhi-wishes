<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ugadi Wishes</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  🌸 Ugadi Habba Shubhashayagalu 🌸
</header>

<div class="container">

  <!-- Neem + Jaggery -->
  <div class="gallery">
    <img src="images/neem.jpg" class="image" alt="Neem">
    <img src="images/jaggery.jpg" class="image" alt="Jaggery">
  </div>

  <!-- Center Rangoli -->
  <img src="images/rangoli.jpg" class="bowl" alt="Ugadi Rangoli">

  <!-- Wishes -->
  <div class="wishes" id="wishText">
    Wishing you a joyful and prosperous Ugadi!
  </div>

  <div class="kannada" id="kannadaText">
    ಯುಗಾದಿ ಹಬ್ಬದ ಹಾರ್ದಿಕ ಶುಭಾಶಯಗಳು!
  </div>

  <!-- Buttons -->
  <button class="main-btn" onclick="changeWish()">✨ Show More Wishes</button>

  <div class="share">
    <button class="whatsapp" onclick="shareWhatsApp()">📲 WhatsApp</button>
    <button class="instagram" onclick="shareInstagram()">📸 Instagram</button>
  </div>

  <div class="signature">
    ✍️ Written by Raksha
  </div>

</div>

<footer>
  Celebrate Ugadi with Bevu-Bella 🍃🍯
</footer>

<script src="script.js"></script>

</body>
</html>
